services:
  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: charcoal_erp
    ports:
      - "3306:3306"
    volumes:
      # A distinct volume makes this item-based release start from the clean
      # baseline without silently reusing a variant/batch-era database volume.
      - mysql_item_based_data:/var/lib/mysql
      - ./charcoal_erp_clean.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: charcoal_erp
      DB_USER: root
      DB_PASSWORD: root
      DB_CONNECTION_LIMIT: 10
      DB_CONNECT_TIMEOUT_MS: 5000
      JWT_SECRET: replace_this_with_a_very_long_random_secret_before_deploy
      JWT_EXPIRES_IN: 1d
      CORS_ORIGIN: http://localhost:3000
      REQUEST_BODY_LIMIT: 1mb
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 1000
      AUTH_RATE_LIMIT_WINDOW_MS: 900000
      AUTH_RATE_LIMIT_MAX: 20
    ports:
      - "3000:3000"

volumes:
  mysql_item_based_data:
